name: Task
description: Executable task with lane, risk, workspace, and write-set contract
title: "[Task] "
labels:
  - kind:task
  - status:ready
  - priority:p2
  - area:governance
  - risk:safe
  - lane:ops-quality
body:
  - type: markdown
    attributes:
      value: |
        Use this form for executable work.

        Before submitting:
        - One lane per task.
        - One branch, one worktree, one PR.
        - Update the auto-applied labels after creation if lane, area, priority, or risk do not match the task.
        - If the write-set touches shared-governance or other critical paths from `.github/guardrails/path-policy.json`, open the PR as draft.
        - Use child tasks for cross-lane write access instead of expanding the write-set informally.

  - type: input
    id: epic-parent
    attributes:
      label: Epic parent
      description: Reference a parent epic when applicable. Use n/a for standalone tasks.
      placeholder: "#12 or n/a"
    validations:
      required: true

  - type: input
    id: parent-task
    attributes:
      label: Parent task
      description: "For child tasks only. Use n/a otherwise. Alias accepted by guardrails: Task mae"
      placeholder: "#40 or n/a"
    validations:
      required: true

  - type: input
    id: current-owner
    attributes:
      label: Current owner
      description: "Person or agent currently responsible. Alias: Owner atual"
      placeholder: "@jadaojoao or agent id"
    validations:
      required: true

  - type: dropdown
    id: official-lane
    attributes:
      label: Official lane
      description: "Must match the `lane:*` label. Alias accepted by guardrails: Lane oficial"
      options:
        - app-ui
        - engine-finance
        - ops-quality
    validations:
      required: true

  - type: dropdown
    id: requester-lane
    attributes:
      label: Requester lane
      description: "Use `n/a` unless this is a child task. Alias: Lane solicitante"
      options:
        - n/a
        - app-ui
        - engine-finance
        - ops-quality
    validations:
      required: true

  - type: input
    id: task-workspace
    attributes:
      label: Task workspace
      description: "Must match `.claude/worktrees/<lane>/<issue-number>-<slug>/`. Alias: Workspace da task"
      placeholder: .claude/worktrees/ops-quality/38-contributing-templates/
    validations:
      required: true

  - type: textarea
    id: expected-write-set
    attributes:
      label: Expected write-set
      description: "List only the files or globs this task is allowed to change. Alias: Write-set esperado"
      placeholder: |
        CONTRIBUTING.md
        .github/ISSUE_TEMPLATE/task.yml
        .github/ISSUE_TEMPLATE/config.yml
    validations:
      required: true

  - type: dropdown
    id: risk-classification
    attributes:
      label: Risk classification
      description: "Use `shared` for shared-governance paths and `contract-sensitive` for public contract changes. Alias: Classificacao de risco"
      options:
        - safe
        - shared
        - contract-sensitive
    validations:
      required: true

  - type: textarea
    id: child-tasks
    attributes:
      label: Child tasks
      description: "List child issues or write `n/a`. Alias: Tasks filhas"
      placeholder: |
        - #81 engine-finance child task
        - #82 app-ui child task
    validations:
      required: true

  - type: textarea
    id: consumption-criteria
    attributes:
      label: Consumption criteria
      description: "Required for child tasks. Use `n/a` for normal tasks. Alias: Criterio de consumo"
      placeholder: |
        n/a
        or
        Requester lane confirms the delivered paths, checks, and integration behavior.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: "Alias accepted by localized templates: Contexto"
      placeholder: Describe the problem, why it matters now, and any governance constraints that shape the solution.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: "Alias accepted by localized templates: Criterios de aceite"
      placeholder: |
        - [ ] Branch and worktree follow the configured pattern
        - [ ] Changed files stay inside the expected write-set
        - [ ] Required validation evidence is attached
    validations:
      required: true
