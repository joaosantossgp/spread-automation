name: Auto Merge

# Triggered when the PR Issue Guardrails check completes.
# If the check passed and the PR is not a draft, squash-merges automatically.
# Requires: GITHUB_TOKEN with contents:write, issues:write, and pull-requests:write.
on:
  workflow_run:
    workflows: ["PR Issue Guardrails"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find open PR for this workflow run
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const headRepoFullName = context.payload.workflow_run.head_repository.full_name;
            const [headOwner] = headRepoFullName.split('/');

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${headOwner}:${headBranch}`,
            });

            if (prs.data.length === 0) {
              core.setOutput('found', 'false');
              core.info('No open PR found for this workflow run. Skipping.');
              return;
            }

            const pr = prs.data[0];
            core.setOutput('found', 'true');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('is_draft', String(pr.draft));
            core.info(`Found PR #${pr.number} - draft: ${pr.draft}`);

      - name: Merge PR with squash strategy
        if: steps.find-pr.outputs.found == 'true' && steps.find-pr.outputs.is_draft == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ steps.find-pr.outputs.pr_number }} via squash..."
          gh pr merge "${{ steps.find-pr.outputs.pr_number }}" \
            --squash \
            --repo "${{ github.repository }}" \
            --delete-branch
          echo "Merge complete."

      - name: Close linked issue after action-driven merge
        if: steps.find-pr.outputs.found == 'true' && steps.find-pr.outputs.is_draft == 'false'
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pullRequest } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });

            const match = (pullRequest.body || '').match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            if (!match) {
              core.info(`PR #${prNumber} does not declare a linked issue. Skipping issue closure.`);
              return;
            }

            const issueNumber = Number(match[1]);
            const { data: issue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: issueNumber,
            });

            if (issue.pull_request) {
              core.info(`Linked reference #${issueNumber} is a pull request. Skipping issue closure.`);
              return;
            }

            const currentLabels = issue.labels.map((label) =>
              typeof label === 'string' ? label : label.name,
            );
            const updatedLabels = [
              ...currentLabels.filter((label) => !label.startsWith('status:')),
              'status:completed',
            ];

            await github.rest.issues.setLabels({
              ...context.repo,
              issue_number: issueNumber,
              labels: updatedLabels,
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issueNumber,
              body: `Task completed. Merged in PR #${prNumber} via the auto-merge workflow.`,
            });

            if (issue.state !== 'closed') {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'completed',
              });
            }

            core.info(`Issue #${issueNumber} closed and marked status:completed.`);

      - name: Skip - PR is still draft
        if: steps.find-pr.outputs.found == 'true' && steps.find-pr.outputs.is_draft == 'true'
        run: |
          echo "PR #${{ steps.find-pr.outputs.pr_number }} is still a draft. Skipping auto-merge."
