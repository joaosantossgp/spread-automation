name: Jules PR Governance

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-jules-pr-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Jules-only post-publication task intake
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          JULES_GOVERNANCE_TOKEN_CONFIGURED: ${{ secrets.JULES_GOVERNANCE_TOKEN != '' }}
        with:
          github-token: ${{ secrets.JULES_GOVERNANCE_TOKEN != '' && secrets.JULES_GOVERNANCE_TOKEN || github.token }}
          script: |
            const RISK_RANK = {
              safe: 0,
              shared: 1,
              "contract-sensitive": 2,
            };

            const CLOSE_KEYWORDS = ["Closes", "Fixes", "Resolves"];
            const JULES_LABEL = "source:jules";
            const DEFAULT_PRIORITY_LABEL = "priority:p2";
            const JULES_MARKERS = [
              "PR created automatically by Jules",
              "jules.google.com/task/",
            ];
            const ISSUE_LABEL_PREFIXES = ["kind:", "status:", "priority:", "area:", "risk:", "lane:"];
            const JULES_TOKEN_CONFIGURED =
              (process.env.JULES_GOVERNANCE_TOKEN_CONFIGURED || "").toLowerCase() === "true";

            const SECTION_ALIASES = {
              owner: ["Current owner", "Owner atual"],
              lane: ["Official lane", "Lane oficial"],
              workspace: ["Task workspace", "Workspace da task"],
              sourcePr: ["Source PR", "PR de origem"],
              writeSet: ["Expected write-set", "Write-set esperado"],
              risk: ["Risk classification", "Classificacao de risco"],
              compatibility: ["Compatibility", "Compatibilidade"],
            };

            function normalizePath(value) {
              return (value || "")
                .replace(/\\/g, "/")
                .replace(/^\.\//, "")
                .trim();
            }

            function dedupe(values) {
              return [...new Set((values || []).filter(Boolean))];
            }

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function extractSection(body, heading) {
              const lines = (body || "").split(/\r?\n/);
              const escapedHeading = escapeRegExp(heading);
              const headingPattern = new RegExp(`^#{2,6}\\s+${escapedHeading}\\s*$`, "i");
              let capturing = false;
              const collected = [];

              for (const line of lines) {
                if (headingPattern.test(line.trim())) {
                  capturing = true;
                  continue;
                }

                if (capturing && /^#{2,6}\s+/.test(line)) {
                  break;
                }

                if (capturing) {
                  collected.push(line);
                }
              }

              return collected.join("\n").trim();
            }

            function extractSectionByAliases(body, aliases) {
              for (const alias of aliases) {
                const value = extractSection(body, alias);
                if (value) {
                  return value;
                }
              }
              return "";
            }

            function requireExactlyOnePrefix(labels, prefix, description) {
              const matches = labels.filter((label) => label.startsWith(prefix));
              if (matches.length !== 1) {
                core.setFailed(
                  `Issue must include exactly one ${description} label. Found: ${matches.join(", ") || "none"}.`,
                );
                return false;
              }
              return true;
            }

            function parseListSection(section) {
              return (section || "")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .map((line) => line.replace(/^[-*]\s*/, ""))
                .map((line) => line.replace(/`/g, "").trim())
                .filter(Boolean);
            }

            function isNotApplicable(value) {
              return /^(n\/a|na|none|no|nenhuma|nenhum)$/i.test((value || "").trim());
            }

            function parsePullRequestReference(value) {
              const match = (value || "").match(/(?:#|pull\/)(\d+)/i);
              return match ? Number(match[1]) : null;
            }

            function expandBracePatterns(pattern) {
              const openIndex = pattern.indexOf("{");
              if (openIndex === -1) {
                return [pattern];
              }

              let depth = 0;
              let closeIndex = -1;
              for (let index = openIndex; index < pattern.length; index += 1) {
                const current = pattern[index];
                if (current === "{") {
                  depth += 1;
                } else if (current === "}") {
                  depth -= 1;
                  if (depth === 0) {
                    closeIndex = index;
                    break;
                  }
                }
              }

              if (closeIndex === -1) {
                return [pattern];
              }

              const before = pattern.slice(0, openIndex);
              const after = pattern.slice(closeIndex + 1);
              const inner = pattern.slice(openIndex + 1, closeIndex);
              const parts = inner.split(",");

              return parts.flatMap((part) => expandBracePatterns(`${before}${part}${after}`));
            }

            function escapeRegexCharacter(character) {
              return /[|\\{}()[\]^$+?.]/.test(character) ? `\\${character}` : character;
            }

            function globToRegex(pattern) {
              const normalized = normalizePath(pattern);
              let regex = "^";

              for (let index = 0; index < normalized.length; index += 1) {
                const current = normalized[index];
                const next = normalized[index + 1];

                if (current === "*" && next === "*") {
                  regex += ".*";
                  index += 1;
                  continue;
                }

                if (current === "*") {
                  regex += "[^/]*";
                  continue;
                }

                if (current === "?") {
                  regex += ".";
                  continue;
                }

                regex += escapeRegexCharacter(current);
              }

              regex += "$";
              return new RegExp(regex);
            }

            function matchesAnyPattern(file, patterns) {
              const normalizedFile = normalizePath(file);
              return (patterns || []).some((pattern) =>
                expandBracePatterns(pattern).some((expandedPattern) =>
                  globToRegex(expandedPattern).test(normalizedFile),
                ),
              );
            }

            function highestRisk(left, right) {
              return RISK_RANK[left] >= RISK_RANK[right] ? left : right;
            }

            function hasCloseKeyword(body, issueNumber) {
              const escaped = issueNumber.toString().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const closePattern = new RegExp(
                `\\b(?:${CLOSE_KEYWORDS.join("|")})\\s+#${escaped}\\b`,
                "i",
              );
              return closePattern.test(body || "");
            }

            function parseLinkedIssue(body) {
              const pattern = new RegExp(`\\b(?:${CLOSE_KEYWORDS.join("|")})\\s+#(\\d+)\\b`, "i");
              const match = (body || "").match(pattern);
              return match ? Number(match[1]) : null;
            }

            function isJulesPr(body, labels) {
              return (
                (labels || []).includes(JULES_LABEL) ||
                JULES_MARKERS.some((marker) => (body || "").includes(marker))
              );
            }

            function allFilesAreDocs(filenames) {
              return (filenames || []).every((file) => {
                const normalized = normalizePath(file).toLowerCase();
                return normalized.startsWith("docs/") || normalized.endsWith(".md");
              });
            }

            function inferArea(lane, filenames) {
              if (allFilesAreDocs(filenames)) {
                return "docs";
              }

              if (lane === "app-ui") {
                return "ui";
              }

              if (lane === "engine-finance") {
                return "engine";
              }

              return "governance";
            }

            function sanitizeTaskTitle(title) {
              const cleaned = (title || "")
                .replace(/^[^A-Za-z0-9]+/, "")
                .replace(/\s+/g, " ")
                .trim();
              return cleaned || "published Jules pull request";
            }

            function buildTaskTitle(pullRequest) {
              return `[Task] intake Jules PR #${pullRequest.number}: ${sanitizeTaskTitle(pullRequest.title)}`.slice(
                0,
                240,
              );
            }

            function buildWriteSet(filenames) {
              return filenames.map((file) => `- \`${file}\``).join("\n");
            }

            function buildIssueBody({ issueNumber, owner, pullRequest, filenames, inference }) {
              const issueRef = issueNumber === "TBD" ? "TBD" : String(issueNumber);
              const workspace = `.claude/worktrees/${inference.lane}/${issueRef}-jules-pr-${pullRequest.number}/`;
              const notes = [
                `Task created or synchronized automatically from Jules PR #${pullRequest.number}.`,
                `Original PR title: ${pullRequest.title}`,
                `Inferred lane from path policy: ${inference.lane}`,
                `Inferred risk from changed paths: ${inference.risk}`,
                ...inference.notes,
              ];

              return [
                "## Planning epic",
                "n/a",
                "",
                "## Executable parent task",
                "n/a",
                "",
                "## Current owner",
                owner,
                "",
                "## Official lane",
                inference.lane,
                "",
                "## Requester lane",
                "n/a",
                "",
                "## Task workspace",
                workspace,
                "",
                "## Source PR",
                `#${pullRequest.number}`,
                "",
                "## Expected write-set",
                buildWriteSet(filenames),
                "",
                "## Risk classification",
                inference.risk,
                "",
                "## Child tasks",
                "n/a",
                "",
                "## Consumption criteria",
                "n/a",
                "",
                "## Context",
                notes.map((note) => `- ${note}`).join("\n"),
                "",
                "## Acceptance criteria",
                `- [ ] PR body includes \`Closes #${issueRef}\``,
                "- [ ] Issue metadata stays aligned with the current Jules PR file list",
                "- [ ] Lane and risk stay consistent with `.github/guardrails/path-policy.json`",
                "- [ ] Draft requirement is satisfied before merge when shared or critical paths are touched",
                "",
              ].join("\n");
            }

            function buildManagedIssueLabels(existingLabels, inference) {
              const preservedLabels = (existingLabels || []).filter(
                (label) => !ISSUE_LABEL_PREFIXES.some((prefix) => label.startsWith(prefix)),
              );
              return dedupe([
                ...preservedLabels,
                "kind:task",
                "status:in-progress",
                DEFAULT_PRIORITY_LABEL,
                `area:${inference.area}`,
                `risk:${inference.risk}`,
                `lane:${inference.lane}`,
              ]);
            }

            function arrayEquals(left, right) {
              const normalizedLeft = dedupe(left).sort();
              const normalizedRight = dedupe(right).sort();
              return (
                normalizedLeft.length === normalizedRight.length &&
                normalizedLeft.every((value, index) => value === normalizedRight[index])
              );
            }

            function replaceSection(body, heading, content) {
              const trimmedBody = (body || "").trim();
              const sectionBlock = `## ${heading}\n${content.trim()}`.trim();
              const sectionPattern = new RegExp(
                `(^|\\n)##\\s+${escapeRegExp(heading)}\\s*\\n[\\s\\S]*?(?=\\n##\\s+|$)`,
                "i",
              );

              if (!trimmedBody) {
                return `${sectionBlock}\n`;
              }

              if (sectionPattern.test(trimmedBody)) {
                return `${trimmedBody.replace(sectionPattern, `$1${sectionBlock}`)}\n`;
              }

              return `${trimmedBody}\n\n${sectionBlock}\n`;
            }

            function buildPrBody(body, issueNumber) {
              let nextBody = (body || "").trim();
              nextBody = replaceSection(nextBody, "Linked Task", `Closes #${issueNumber}`);
              nextBody = replaceSection(
                nextBody,
                "Governance Metadata",
                `- Intake flow: source:jules\n- Linked task: #${issueNumber}`,
              );
              return nextBody.trim();
            }

            function classifyFile(policy, file) {
              const matchedGroups = (policy.criticalGroups || []).filter((group) =>
                matchesAnyPattern(file, group.patterns),
              );

              if (matchedGroups.length > 1) {
                const allowedLanes = matchedGroups.reduce(
                  (allowed, group) => allowed.filter((lane) => group.allowedLanes.includes(lane)),
                  matchedGroups[0].allowedLanes.slice(),
                );
                return {
                  allowedLanes,
                  ownerLanes: dedupe(matchedGroups.map((group) => group.ownerLane).filter(Boolean)),
                  minimumRisk: matchedGroups.reduce(
                    (risk, group) => highestRisk(risk, group.minimumRisk),
                    "safe",
                  ),
                  requireDraft: matchedGroups.some((group) => !!group.requireDraft),
                  requireCompatibility: matchedGroups.some((group) => !!group.requireCompatibility),
                };
              }

              if (matchedGroups.length === 1) {
                const [group] = matchedGroups;
                return {
                  allowedLanes: group.allowedLanes.slice(),
                  ownerLanes: group.ownerLane ? [group.ownerLane] : [],
                  minimumRisk: group.minimumRisk,
                  requireDraft: !!group.requireDraft,
                  requireCompatibility: !!group.requireCompatibility,
                };
              }

              return {
                allowedLanes: Object.entries(policy.laneAllowlists || {})
                  .filter(([, patterns]) => matchesAnyPattern(file, patterns))
                  .map(([lane]) => lane),
                ownerLanes: [],
                minimumRisk: "safe",
                requireDraft: false,
                requireCompatibility: false,
              };
            }

            function inferTaskMetadata(policy, filenames) {
              const fileClassifications = filenames.map((file) => ({
                file,
                ...classifyFile(policy, file),
              }));

              let minimumRequiredRisk = "safe";
              let requiresDraft = false;
              let requiresCompatibility = false;
              let candidateLanes = null;
              const ownerLaneHints = [];
              const notes = [];
              const unclassifiedFiles = [];

              for (const classification of fileClassifications) {
                if (!classification.allowedLanes.length) {
                  unclassifiedFiles.push(classification.file);
                  continue;
                }

                candidateLanes = candidateLanes
                  ? candidateLanes.filter((lane) => classification.allowedLanes.includes(lane))
                  : classification.allowedLanes.slice();

                ownerLaneHints.push(...classification.ownerLanes);
                minimumRequiredRisk = highestRisk(minimumRequiredRisk, classification.minimumRisk);
                requiresDraft = requiresDraft || classification.requireDraft;
                requiresCompatibility = requiresCompatibility || classification.requireCompatibility;
              }

              candidateLanes = candidateLanes || [];
              const uniqueOwnerLanes = dedupe(ownerLaneHints);
              const nonMasterCandidates = candidateLanes.filter((lane) => lane !== "master");

              let lane = "ops-quality";
              if (candidateLanes.length === 1) {
                lane = candidateLanes[0];
              } else if (nonMasterCandidates.length === 1) {
                lane = nonMasterCandidates[0];
              } else if (
                uniqueOwnerLanes.length === 1 &&
                candidateLanes.includes(uniqueOwnerLanes[0])
              ) {
                lane = uniqueOwnerLanes[0];
              } else if (candidateLanes.includes("ops-quality")) {
                lane = "ops-quality";
              }

              if (!candidateLanes.length) {
                notes.push("No unambiguous lane candidate was found; using ops-quality fallback.");
              } else if (candidateLanes.length > 1 && lane === "ops-quality") {
                notes.push(
                  `Multiple lane candidates remained (${candidateLanes.join(", ")}); using ops-quality fallback.`,
                );
              }

              const disallowedMixes = [];
              for (const mix of policy.disallowedDomainMixes || []) {
                const leftTouched = filenames.some((file) => matchesAnyPattern(file, mix.left));
                const rightTouched = filenames.some((file) => matchesAnyPattern(file, mix.right));

                if (leftTouched && rightTouched) {
                  const exemptLanes = mix.exemptLanes || mix.exempt_lanes || [];
                  if (!exemptLanes.includes(lane)) {
                    disallowedMixes.push(mix.name);
                  }
                }
              }

              return {
                lane,
                area: inferArea(lane, filenames),
                risk: minimumRequiredRisk,
                requiresDraft,
                requiresCompatibility,
                candidateLanes,
                unclassifiedFiles,
                disallowedMixes,
                notes,
              };
            }

            async function ensureRepoLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  ...context.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  ...context.repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function ensurePrLabel(prNumber, labels) {
              if ((labels || []).includes(JULES_LABEL)) {
                return;
              }

              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: prNumber,
                labels: [JULES_LABEL],
              });
            }

            async function tryConvertToDraft(pullRequestId) {
              if (!pullRequestId) {
                return {
                  ok: false,
                  message: "Jules PR draft enforcement could not run because the pull request node id is missing.",
                };
              }

              try {
                await github.graphql(
                  `
                    mutation($pullRequestId: ID!) {
                      convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                        pullRequest {
                          id
                          isDraft
                        }
                      }
                    }
                  `,
                  { pullRequestId },
                );
                return { ok: true };
              } catch (error) {
                if (!JULES_TOKEN_CONFIGURED) {
                  return {
                    ok: false,
                    message:
                      "Jules PR touches shared or critical paths and must be draft, but automatic draft conversion is not available with the default GITHUB_TOKEN. Configure repository secret JULES_GOVERNANCE_TOKEN with pull request write access to enable full automation, or convert the PR to draft manually.",
                  };
                }

                return {
                  ok: false,
                  message: `Jules PR must be draft, but automatic conversion failed even with JULES_GOVERNANCE_TOKEN configured: ${error.message}`,
                };
              }
            }

            async function fetchPolicy(ref) {
              const { data: policyFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: ".github/guardrails/path-policy.json",
                ref,
              });

              return JSON.parse(
                Buffer.from(policyFile.content, policyFile.encoding).toString("utf8"),
              );
            }

            async function fetchChangedFiles(prNumber) {
              const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                ...context.repo,
                pull_number: prNumber,
                per_page: 100,
              });

              return changedFiles.map((file) => normalizePath(file.filename)).filter(Boolean);
            }

            async function createAutomatedIssue(pullRequest, filenames, inference) {
              const owner = pullRequest.user?.login ? `@${pullRequest.user.login}` : "jules";
              const placeholderBody = buildIssueBody({
                issueNumber: "TBD",
                owner,
                pullRequest,
                filenames,
                inference,
              });
              const labels = buildManagedIssueLabels([], inference);

              const { data: createdIssue } = await github.rest.issues.create({
                ...context.repo,
                title: buildTaskTitle(pullRequest),
                body: placeholderBody,
                labels,
              });

              const finalBody = buildIssueBody({
                issueNumber: createdIssue.number,
                owner,
                pullRequest,
                filenames,
                inference,
              });

              await github.rest.issues.update({
                ...context.repo,
                issue_number: createdIssue.number,
                body: finalBody,
              });

              const { data: refreshedIssue } = await github.rest.issues.get({
                ...context.repo,
                issue_number: createdIssue.number,
              });

              return refreshedIssue;
            }

            async function syncIssue(issue, pullRequest, filenames, inference) {
              const issueLabels = issue.labels.map((label) =>
                typeof label === "string" ? label : label.name,
              );
              const existingOwner = extractSectionByAliases(issue.body || "", SECTION_ALIASES.owner);
              const owner =
                existingOwner && !isNotApplicable(existingOwner) && !/^tbd$/i.test(existingOwner)
                  ? existingOwner
                  : pullRequest.user?.login
                    ? `@${pullRequest.user.login}`
                    : "jules";

              const nextBody = buildIssueBody({
                issueNumber: issue.number,
                owner,
                pullRequest,
                filenames,
                inference,
              });
              if ((issue.body || "").trim() !== nextBody.trim()) {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: issue.number,
                  body: nextBody,
                });
              }

              const nextLabels = buildManagedIssueLabels(issueLabels, inference);
              if (!arrayEquals(issueLabels, nextLabels)) {
                await github.rest.issues.setLabels({
                  ...context.repo,
                  issue_number: issue.number,
                  labels: nextLabels,
                });
              }

              const { data: refreshedIssue } = await github.rest.issues.get({
                ...context.repo,
                issue_number: issue.number,
              });
              return refreshedIssue;
            }

            async function ensurePrBodyLinked(pullRequest, issueNumber) {
              const nextBody = buildPrBody(pullRequest.body || "", issueNumber);
              if ((pullRequest.body || "").trim() === nextBody.trim()) {
                return nextBody;
              }

              await github.rest.pulls.update({
                ...context.repo,
                pull_number: pullRequest.number,
                body: nextBody,
              });

              return nextBody;
            }

            const pullRequest = context.payload.pull_request;
            const prLabels = (pullRequest.labels || []).map((label) =>
              typeof label === "string" ? label : label.name,
            );

            if (!isJulesPr(pullRequest.body || "", prLabels)) {
              core.info("Not a Jules PR. Skipping Jules-specific governance validation.");
              return;
            }

            await ensureRepoLabel(JULES_LABEL, "1d76db", "PR published automatically by Jules");
            await ensurePrLabel(pullRequest.number, prLabels);

            const filenames = await fetchChangedFiles(pullRequest.number);
            if (filenames.length === 0) {
              core.setFailed(`PR #${pullRequest.number} has no changed files.`);
              return;
            }

            const policy = await fetchPolicy(pullRequest.head.sha);
            const inference = inferTaskMetadata(policy, filenames);

            let issueNumber = parseLinkedIssue(pullRequest.body || "");
            let issue;
            if (!issueNumber) {
              issue = await createAutomatedIssue(pullRequest, filenames, inference);
              issueNumber = issue.number;
              pullRequest.body = await ensurePrBodyLinked(pullRequest, issueNumber);
              core.info(`Created task issue #${issueNumber} and linked the Jules PR automatically.`);
            } else {
              const response = await github.rest.issues.get({
                ...context.repo,
                issue_number: issueNumber,
              });
              issue = response.data;
            }

            if (issue.pull_request) {
              core.setFailed(`#${issueNumber} is a pull request. Link this Jules PR to a task issue instead.`);
              return;
            }

            if (issue.state !== "open") {
              core.setFailed(`Issue #${issueNumber} must remain open while the Jules PR is under review.`);
              return;
            }

            issue = await syncIssue(issue, pullRequest, filenames, inference);
            pullRequest.body = await ensurePrBodyLinked(pullRequest, issue.number);

            const labels = issue.labels.map((label) => (typeof label === "string" ? label : label.name));

            if (!labels.includes("kind:task")) {
              core.setFailed(`Issue #${issueNumber} must include "kind:task".`);
              return;
            }

            if (!requireExactlyOnePrefix(labels, "status:", "status:*")) return;
            if (!requireExactlyOnePrefix(labels, "priority:", "priority:*")) return;
            if (!requireExactlyOnePrefix(labels, "area:", "area:*")) return;
            if (!requireExactlyOnePrefix(labels, "risk:", "risk:*")) return;
            if (!requireExactlyOnePrefix(labels, "lane:", "lane:*")) return;

            const owner = extractSectionByAliases(issue.body || "", SECTION_ALIASES.owner);
            const laneSection = extractSectionByAliases(issue.body || "", SECTION_ALIASES.lane)
              .toLowerCase()
              .trim();
            const workspace = normalizePath(
              extractSectionByAliases(issue.body || "", SECTION_ALIASES.workspace),
            );
            const sourcePrSection = extractSectionByAliases(issue.body || "", SECTION_ALIASES.sourcePr);
            const writeSet = extractSectionByAliases(issue.body || "", SECTION_ALIASES.writeSet);
            const risk = extractSectionByAliases(issue.body || "", SECTION_ALIASES.risk)
              .toLowerCase()
              .trim();

            if (!owner || /^tbd$/i.test(owner)) {
              core.setFailed(`Issue #${issueNumber} must declare a concrete current owner.`);
              return;
            }

            if (!workspace || /^tbd/i.test(workspace)) {
              core.setFailed(`Issue #${issueNumber} must declare a concrete task workspace path.`);
              return;
            }

            if (!writeSet) {
              core.setFailed(`Issue #${issueNumber} must declare an expected write-set.`);
              return;
            }

            const acceptedRiskValues = ["safe", "shared", "contract-sensitive"];
            if (!acceptedRiskValues.includes(risk)) {
              core.setFailed(
                `Issue #${issueNumber} risk classification must be one of: ${acceptedRiskValues.join(", ")}.`,
              );
              return;
            }

            const expectedRiskLabel = `risk:${risk}`;
            if (!labels.includes(expectedRiskLabel)) {
              core.setFailed(
                `Issue #${issueNumber} declares risk "${risk}" but does not include label "${expectedRiskLabel}".`,
              );
              return;
            }

            const laneLabel = labels.find((label) => label.startsWith("lane:"));
            const laneFromLabel = laneLabel.replace(/^lane:/, "").trim().toLowerCase();

            if (laneSection && !isNotApplicable(laneSection) && laneSection !== laneFromLabel) {
              core.setFailed(
                `Issue #${issueNumber} lane section "${laneSection}" does not match lane label "${laneFromLabel}".`,
              );
              return;
            }

            const sourcePrNumber = parsePullRequestReference(sourcePrSection);
            if (!sourcePrNumber || sourcePrNumber !== pullRequest.number) {
              core.setFailed(
                `Issue #${issueNumber} must record Source PR as #${pullRequest.number}. Current: "${sourcePrSection || "missing"}".`,
              );
              return;
            }

            const expectedWorkspaceFragment = normalizePath(
              `.claude/worktrees/${laneFromLabel}/${issueNumber}-`,
            );
            if (!workspace.includes(expectedWorkspaceFragment)) {
              core.setFailed(
                `Issue #${issueNumber} workspace should include "${expectedWorkspaceFragment}". Current: "${workspace}".`,
              );
              return;
            }

            const duplicatePrs = await github.paginate(github.rest.pulls.list, {
              ...context.repo,
              state: "open",
              per_page: 100,
            });

            const conflictingPrs = duplicatePrs.filter((otherPr) => {
              if (otherPr.number === pullRequest.number) {
                return false;
              }

              return hasCloseKeyword(otherPr.body || "", issueNumber);
            });

            if (conflictingPrs.length > 0) {
              core.setFailed(
                `Task #${issueNumber} already has another open PR: ${conflictingPrs
                  .map((pr) => `#${pr.number}`)
                  .join(", ")}. Keep one official PR per task.`,
              );
              return;
            }

            const writePatterns = parseListSection(writeSet);
            if (writePatterns.length === 0) {
              core.setFailed(`Issue #${issueNumber} expected write-set must contain at least one item.`);
              return;
            }

            for (const file of filenames) {
              if (!matchesAnyPattern(file, writePatterns)) {
                core.setFailed(
                  `Changed file "${file}" is not covered by issue #${issueNumber} expected write-set.`,
                );
                return;
              }
            }

            if (inference.unclassifiedFiles.length > 0) {
              core.setFailed(
                `These files are not classified in .github/guardrails/path-policy.json: ${inference.unclassifiedFiles.join(", ")}.`,
              );
              return;
            }

            for (const file of filenames) {
              const classification = classifyFile(policy, file);
              if (!classification.allowedLanes.includes(laneFromLabel)) {
                core.setFailed(
                  `Lane "${laneFromLabel}" does not cover file "${file}". Allowed lanes: ${classification.allowedLanes.join(", ")}.`,
                );
                return;
              }
            }

            if (RISK_RANK[risk] < RISK_RANK[inference.risk]) {
              core.setFailed(
                `Issue #${issueNumber} risk "${risk}" is lower than required minimum "${inference.risk}" for changed paths.`,
              );
              return;
            }

            if (inference.disallowedMixes.length > 0) {
              core.setFailed(
                `PR violates disallowed domain mix(s): ${inference.disallowedMixes.join(", ")}. Split work into lane-specific tasks/PRs.`,
              );
              return;
            }

            if (inference.requiresDraft && !pullRequest.draft) {
              const draftResult = await tryConvertToDraft(pullRequest.node_id);
              if (!draftResult.ok) {
                core.setFailed(draftResult.message);
                return;
              }
            }

            if (inference.requiresCompatibility) {
              const compatibility = extractSectionByAliases(pullRequest.body || "", SECTION_ALIASES.compatibility);
              const hasPolicy =
                compatibility.includes("additive-only") ||
                compatibility.includes("breaking-approved");

              if (!hasPolicy) {
                core.setFailed(
                  "PR touching contract-sensitive paths must declare compatibility policy in a compatibility section.",
                );
                return;
              }
            }

            core.info("Jules PR governance intake validated successfully.");
